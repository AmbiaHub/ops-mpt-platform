<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPS MPT - Collaborative Spatial Intelligence</title>
    <!-- Google Fonts: Sora untuk kesan modern & tech -->
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Sora', sans-serif; background-color: #f8fafc; margin: 0; }
        .sidebar { background-color: #0f172a; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .map-placeholder { background: linear-gradient(45deg, #e2e8f0 25%, #cbd5e1 25%, #cbd5e1 50%, #e2e8f0 50%, #e2e8f0 75%, #cbd5e1 75%, #cbd5e1 100%); background-size: 20px 20px; }
        .active-tab { background-color: #1e293b; color: #fbbf24; border-left: 4px solid #fbbf24; }
        .nav-link:hover { background-color: #1e293b; color: #fbbf24; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [tab, setTab] = useState('home');

            return (
                <div className="flex min-h-screen">
                    {/* SIDEBAR NAVIGATION */}
                    <aside className="sidebar w-20 md:w-64 sticky top-0 h-screen text-slate-300 p-4 md:p-6 flex flex-col">
                        <div className="flex items-center gap-3 mb-10 overflow-hidden">
                            <div className="w-8 h-8 bg-yellow-400 rounded flex-shrink-0 flex items-center justify-center text-slate-900 font-extrabold text-xs">OPS</div>
                            <span className="text-white font-extrabold tracking-wider hidden md:block text-sm uppercase">MPT Platform</span>
                        </div>
                        
                        <nav className="space-y-2 text-sm flex-1">
                            <TabButton id="home" icon="📊" label="Dashboard" active={tab} onClick={setTab} />
                            <TabButton id="survei" icon="📝" label="Survey Entry" active={tab} onClick={setTab} />
                            <TabButton id="data" icon="📚" label="Repository" active={tab} onClick={setTab} />
                            <TabButton id="tim" icon="👥" label="Members" active={tab} onClick={setTab} />
                        </nav>
                        
                        <div className="mt-auto pt-10 hidden md:block">
                            <div className="bg-slate-800 p-4 rounded-xl border border-slate-700">
                                <p className="text-[10px] font-bold uppercase text-yellow-400 tracking-widest">Status Proyek</p>
                                <p className="text-[11px] text-white mt-1 font-light leading-relaxed">Studio Perencanaan Wilayah - Sepatan</p>
                            </div>
                        </div>
                    </aside>

                    {/* MAIN CONTENT AREA */}
                    <main className="flex-1 p-4 md:p-10 bg-[#f8fafc]">
                        <header className="flex justify-between items-center mb-10">
                            <div>
                                <h1 className="text-xl md:text-2xl font-extrabold text-slate-800 tracking-tight">Spatial Intelligence</h1>
                                <p className="text-[10px] md:text-sm text-slate-500 font-medium">Collaborative Planning System v1.0</p>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="text-right hidden sm:block">
                                    <p className="text-sm font-bold text-slate-800 uppercase tracking-tighter">Ambia Mursalin</p>
                                    <p className="text-[10px] text-slate-400 font-bold uppercase">Sales Engineer | PWK UT</p>
                                </div>
                                <div className="w-10 h-10 rounded-full bg-slate-800 border-2 border-yellow-400 flex items-center justify-center text-white font-bold text-xs shadow-xl transition-transform hover:scale-110 cursor-pointer">AM</div>
                            </div>
                        </header>

                        {/* VIEW SWITCHER */}
                        <div className="animate-in fade-in slide-in-from-bottom-2 duration-500">
                            {tab === 'home' && <DashboardView />}
                            {tab === 'survei' && <SurveyView />}
                            {tab === 'data' && <DataView />}
                            {tab === 'tim' && <TeamView />}
                        </div>
                    </main>
                </div>
            );
        };

        const TabButton = ({ id, icon, label, active, onClick }) => (
            <button 
                onClick={() => onClick(id)} 
                className={`w-full flex items-center gap-4 p-3 rounded-xl transition-all duration-200 ${active === id ? 'active-tab text-yellow-400 shadow-lg' : 'nav-link text-slate-400'}`}
            >
                <span className="text-xl">{icon}</span>
                <span className="hidden md:block font-semibold tracking-wide text-xs uppercase">{label}</span>
            </button>
        );

        const DashboardView = () => (
            <div className="space-y-8">
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <StatCard label="Progress" value="65%" sub="Kajian Wilayah Sepatan" color="border-yellow-400" />
                    <StatCard label="Dataset" value="12" sub="File Spasial Terverifikasi" color="border-blue-500" />
                    <StatCard label="Team" value="07" sub="Anggota Aktif Terdaftar" color="border-green-500" />
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div className="lg:col-span-2">
                        <div className="glass-card rounded-3xl overflow-hidden shadow-sm">
                            <div className="p-4 bg-slate-800 text-white flex justify-between items-center text-[10px] font-bold tracking-widest uppercase">
                                <span>📍 Live Spatial Preview: Kec. Sepatan</span>
                                <span className="bg-red-500 px-2 py-0.5 rounded-full animate-pulse">Live Tracking</span>
                            </div>
                            <div className="h-64 md:h-96 w-full map-placeholder flex items-center justify-center relative">
                                <div className="bg-white/95 p-6 rounded-2xl shadow-2xl text-center z-10 mx-6 border border-slate-100">
                                    <p className="text-xs font-extrabold text-slate-800 uppercase tracking-widest">Peta Temuan Lapangan</p>
                                    <p className="text-[10px] text-slate-500 mt-2 leading-relaxed">Visualisasi Jaringan Drainase & <br/>Titik Kemacetan Koridor Utama</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="glass-card p-6 rounded-3xl shadow-sm border border-slate-100">
                        <h4 className="font-extrabold text-slate-800 mb-8 uppercase text-[10px] tracking-[0.2em]">Activity Timeline</h4>
                        <div className="space-y-8 border-l-2 border-slate-50 ml-2">
                            <TimelineItem date="24 APR" text="Survey Kemacetan Pasar Sepatan diinput oleh Irfan." status="bg-yellow-400" />
                            <TimelineItem date="25 APR" text="Data SHP Drainase diunggah ke Repository." status="bg-blue-500" />
                            <TimelineItem date="26 APR" text="Analisis Spasial Studio Planning dimulai." status="bg-green-500" />
                        </div>
                    </div>
                </div>
            </div>
        );

        const StatCard = ({ label, value, sub, color }) => (
            <div className={`glass-card p-6 rounded-2xl border-l-4 ${color} shadow-sm transition-transform hover:-translate-y-1`}>
                <p className="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest">{label}</p>
                <h3 className="text-3xl font-extrabold text-slate-800 mt-2">{value}</h3>
                <p className="text-[10px] text-slate-500 mt-1 font-medium">{sub}</p>
            </div>
        );

        const TimelineItem = ({ date, text, status }) => (
            <div className="flex gap-4 relative">
                <div className={`w-3 h-3 rounded-full ${status} mt-1 -ml-[7px] ring-4 ring-white shadow-sm`}></div>
                <div>
                    <p className="text-[9px] font-extrabold text-slate-400 tracking-tighter uppercase">{date}</p>
                    <p className="text-[11px] text-slate-700 leading-relaxed font-medium mt-1">{text}</p>
                </div>
            </div>
        );

        const SurveyView = () => (
            <div className="glass-card p-6 md:p-10 rounded-[2.5rem] max-w-2xl shadow-xl border border-slate-100">
                <div className="mb-8">
                    <h2 className="text-xl font-extrabold text-slate-800">Survey Entry</h2>
                    <p className="text-xs text-slate-500 mt-1">Input data temuan fisik di wilayah Kecamatan Sepatan</p>
                </div>
                <div className="space-y-6">
                    <div>
                        <label className="text-[10px] font-extrabold text-slate-400 uppercase tracking-[0.15em] ml-1">Lokasi Koordinat/Jalan</label>
                        <input type="text" className="w-full mt-2 p-4 rounded-2xl bg-slate-50 border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-yellow-400 transition-all outline-none text-sm font-medium" placeholder="Misal: Perempatan Pasar Sepatan" />
                    </div>
                    <div>
                        <label className="text-[10px] font-extrabold text-slate-400 uppercase tracking-[0.15em] ml-1">Kategori Masalah Spasial</label>
                        <select className="w-full mt-2 p-4 rounded-2xl bg-slate-50 border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-yellow-400 outline-none text-sm font-medium appearance-none">
                            <option>Kemacetan & Hambatan Samping</option>
                            <option>Drainase Buruk / Banjir</option>
                            <option>Kerusakan Infrastruktur Jalan</option>
                            <option>Kurangnya Fasilitas Umum</option>
                        </select>
                    </div>
                    <div>
                        <label className="text-[10px] font-extrabold text-slate-400 uppercase tracking-[0.15em] ml-1">Deskripsi Singkat</label>
                        <textarea className="w-full mt-2 p-4 rounded-2xl bg-slate-50 border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-yellow-400 outline-none text-sm font-medium" rows="3" placeholder="Jelaskan kondisi detail di lapangan..."></textarea>
                    </div>
                    <button 
                        onClick={() => alert('Sinkronisasi Berhasil: Data telah masuk ke database OPS MPT.')}
                        className="w-full bg-slate-900 text-yellow-400 font-extrabold p-5 rounded-2xl shadow-2xl hover:bg-slate-800 transition-all active:scale-[0.98] text-xs uppercase tracking-[0.2em] mt-4"
                    >
                        Submit ke Cloud Platform
                    </button>
                </div>
            </div>
        );

        const DataView = () => (
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {[
                    {n: "RTRW Kab. Tangerang 2025", t: "PDF", s: "45 MB", c: "bg-red-50 text-red-600"},
                    {n: "Peta Jaringan Jalan Sepatan", t: "SHP", s: "12 MB", c: "bg-blue-50 text-blue-600"},
                    {n: "Kependudukan (BPS 2024)", t: "XLSX", s: "2.4 MB", c: "bg-green-50 text-green-600"},
                    {n: "Analisis Kesesuaian Lahan", t: "QGIS", s: "88 MB", c: "bg-purple-50 text-purple-600"}
                ].map((d, i) => (
                    <div key={i} className="glass-card p-6 rounded-2xl flex justify-between items-center group cursor-pointer hover:shadow-md transition-all border border-slate-50">
                        <div className="flex items-center gap-4">
                            <div className={`w-12 h-12 ${d.c} rounded-xl flex items-center justify-center font-black text-[10px] group-hover:scale-110 transition-transform tracking-tighter`}>{d.t}</div>
                            <div>
                                <p className="text-sm font-extrabold text-slate-800 leading-tight">{d.n}</p>
                                <p className="text-[9px] text-slate-400 font-bold mt-1 uppercase tracking-widest">{d.s} • Cloud Storage</p>
                            </div>
                        </div>
                        <span className="text-xl opacity-20 group-hover:opacity-100 transition-opacity">📥</span>
                    </div>
                ))}
            </div>
        );

        const TeamView = () => (
            <div className="grid grid-cols-2 md:grid-cols-3 gap-6">
                {[
                    {n: "Ambia", r: "Ketua Tim", a: "AM"},
                    {n: "Irfan", r: "Anggota", a: "IF"},
                    {n: "Deny", r: "Anggota", a: "DN"},
                    {n: "Wira", r: "Anggota", a: "WR"},
                    {n: "Estu", r: "Anggota", a: "ES"},
                    {n: "Arga", r: "Anggota", a: "AR"}
                ].map((m, i) => (
                    <div key={i} className="glass-card p-6 rounded-3xl text-center border border-slate-50 hover:bg-slate-50 transition-colors">
                        <div className="w-14 h-14 bg-slate-900 text-yellow-400 rounded-full flex items-center justify-center font-black mx-auto mb-4 text-sm ring-4 ring-slate-100">{m.a}</div>
                        <p className="text-sm font-extrabold text-slate-800">{m.n}</p>
                        <p className="text-[9px] font-bold text-slate-400 uppercase mt-1 tracking-widest">{m.r}</p>
                    </div>
                ))}
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPS MPT - Operational Planning & Spatial Monitoring</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Leaflet CSS untuk Peta Interaktif -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Sora', sans-serif; background-color: #f8fafc; }
        .sidebar { background-color: #0f172a; transition: all 0.3s; }
        #map { height: 400px; border-radius: 1.5rem; z-index: 10; }
        .active-tab { background-color: #1e293b; color: #fbbf24; border-left: 4px solid #fbbf24; }
        .pulse-live { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [tab, setTab] = useState('home');

            return (
                <div className="flex min-h-screen">
                    {/* SIDEBAR */}
                    <aside className="sidebar w-16 md:w-64 sticky top-0 h-screen text-slate-300 p-4 md:p-6 flex flex-col shadow-2xl">
                        <div className="flex items-center gap-3 mb-10">
                            <div className="w-8 h-8 bg-yellow-400 rounded-lg flex-shrink-0 flex items-center justify-center text-slate-900 font-black text-xs shadow-[0_0_15px_rgba(251,191,36,0.4)]">OPS</div>
                            <span className="text-white font-extrabold tracking-tighter hidden md:block text-sm">MPT v1.0</span>
                        </div>
                        
                        <nav className="space-y-2 flex-1">
                            <button onClick={() => setTab('home')} className={`w-full flex items-center justify-center md:justify-start gap-4 p-3 rounded-xl transition-all ${tab === 'home' ? 'active-tab' : 'hover:bg-slate-800'}`}>
                                <span>📊</span> <span className="hidden md:block text-[10px] font-bold uppercase tracking-widest">Dashboard</span>
                            </button>
                            <button onClick={() => setTab('survei')} className={`w-full flex items-center justify-center md:justify-start gap-4 p-3 rounded-xl transition-all ${tab === 'survei' ? 'active-tab' : 'hover:bg-slate-800'}`}>
                                <span>📝</span> <span className="hidden md:block text-[10px] font-bold uppercase tracking-widest">Survey Entry</span>
                            </button>
                        </nav>
                        
                        <div className="mt-auto hidden md:block bg-slate-800/50 p-4 rounded-2xl border border-slate-700">
                            <div className="flex items-center gap-2 mb-2">
                                <div className="w-2 h-2 rounded-full bg-green-500 pulse-live"></div>
                                <span className="text-[9px] font-bold text-slate-400 uppercase">System Online</span>
                            </div>
                            <p className="text-[10px] text-slate-500 italic">"Operational Planning & Spatial Monitoring"</p>
                        </div>
                    </aside>

                    {/* MAIN */}
                    <main className="flex-1 p-4 md:p-8 overflow-y-auto bg-slate-50">
                        <header className="flex justify-between items-center mb-8 bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                            <div>
                                <h1 className="text-xl font-black text-slate-800 tracking-tight uppercase">Command Center</h1>
                                <p className="text-[10px] text-slate-400 font-bold tracking-widest">KECAMATAN SEPATAN SPATIAL DATA</p>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="text-right hidden sm:block">
                                    <p className="text-xs font-black text-slate-800">Ambia Mursalin</p>
                                    <p className="text-[9px] text-yellow-600 font-bold uppercase tracking-tighter">Director of Spatial Ops</p>
                                </div>
                                <div className="w-12 h-12 rounded-2xl bg-slate-900 border-2 border-yellow-400 flex items-center justify-center text-yellow-400 font-black shadow-lg">AM</div>
                            </div>
                        </header>

                        {tab === 'home' && <Dashboard />}
                        {tab === 'survei' && <SurveyView />}
                    </main>
                </div>
            );
        };

        const Dashboard = () => {
            useEffect(() => {
                // Inisialisasi Peta Interaktif
                const map = L.map('map').setView([-6.126, 106.574], 13); // Koordinat Sepatan
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '&copy; OpenStreetMap'
                }).addTo(map);

                // Tambah Marker Dummy di Sepatan
                L.marker([-6.126, 106.574]).addTo(map)
                    .bindPopup('<b>Titik Pantau Utama</b><br>Kecamatan Sepatan.')
                    .openPopup();
                
                L.circle([-6.130, 106.580], { color: 'red', radius: 500 }).addTo(map)
                    .bindPopup('Area Potensi Banjir');

                return () => map.remove();
            }, []);

            return (
                <div className="space-y-6 animate-in fade-in duration-700">
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                            <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Project</p>
                            <h3 className="text-2xl font-black text-slate-800 mt-1">01</h3>
                        </div>
                        <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                            <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Status</p>
                            <h3 className="text-2xl font-black text-yellow-500 mt-1">65%</h3>
                        </div>
                        <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                            <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Team</p>
                            <h3 className="text-2xl font-black text-slate-800 mt-1">07</h3>
                        </div>
                        <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                            <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Nodes</p>
                            <h3 className="text-2xl font-black text-blue-500 mt-1">128</h3>
                        </div>
                    </div>

                    <div className="bg-white p-4 rounded-[2.5rem] shadow-xl border border-slate-200 overflow-hidden">
                        <div className="flex items-center justify-between p-4 border-b border-slate-50 mb-4">
                            <h3 className="text-xs font-black uppercase tracking-[0.2em] text-slate-800 flex items-center gap-2">
                                <span className="w-2 h-2 bg-red-500 rounded-full pulse-live"></span>
                                Live Spatial Monitoring
                            </h3>
                            <span className="text-[9px] font-bold text-slate-400 bg-slate-50 px-3 py-1 rounded-full italic">OpenStreetMap Engine</span>
                        </div>
                        <div id="map"></div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="bg-slate-900 p-8 rounded-[2.5rem] text-white relative overflow-hidden group">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-yellow-400/10 rounded-full -mr-10 -mt-10 group-hover:scale-150 transition-transform duration-700"></div>
                            <h4 className="text-xs font-black uppercase tracking-widest text-yellow-400">Analytic Insight</h4>
                            <p className="mt-4 text-sm font-light leading-relaxed text-slate-300">
                                Berdasarkan data spasial terbaru, koridor utama Sepatan mengalami lonjakan hambatan samping sebesar <span className="font-bold text-white text-lg">12%</span> pada jam sibuk sore hari.
                            </p>
                            <button className="mt-6 text-[10px] font-black uppercase tracking-widest bg-yellow-400 text-slate-900 px-6 py-3 rounded-xl hover:shadow-[0_0_20px_rgba(251,191,36,0.5)] transition-all">Download Report</button>
                        </div>

                        <div className="bg-white p-8 rounded-[2.5rem] border border-slate-100">
                            <h4 className="text-xs font-black uppercase tracking-widest text-slate-400 mb-6 italic">Ops Activity Log</h4>
                            <div className="space-y-4">
                                <LogItem user="Irfan" action="Added survey point" time="12m ago" />
                                <LogItem user="Deny" action="Updated GIS Layer" time="45m ago" />
                                <LogItem user="Ambia" action="System Backup" time="2h ago" />
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const LogItem = ({ user, action, time }) => (
            <div className="flex items-center justify-between border-b border-slate-50 pb-3">
                <div>
                    <span className="text-[11px] font-black text-slate-800">{user}</span>
                    <span className="text-[11px] text-slate-400 ml-2">{action}</span>
                </div>
                <span className="text-[9px] font-bold text-slate-300 uppercase italic">{time}</span>
            </div>
        );

        const SurveyView = () => (
            <div className="bg-white p-8 md:p-12 rounded-[3rem] max-w-2xl mx-auto shadow-2xl animate-in slide-in-from-bottom-10 duration-700">
                <div className="mb-10 text-center">
                    <h2 className="text-2xl font-black text-slate-800 uppercase tracking-tighter">Survey Submission</h2>
                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-2">Sinkronisasi Data Lapangan Real-Time</p>
                </div>
                <div className="space-y-6">
                    <InputField label="Koordinat / Nama Lokasi" icon="📍" placeholder="Titik Simpang Sepatan..." />
                    <InputField label="Kategori Temuan" icon="📁" placeholder="Drainase / Macet / Sampah..." />
                    <div className="pt-4">
                        <button onClick={() => alert('Data Spasial Berhasil Masuk Antrean Database!')} className="w-full bg-slate-900 text-yellow-400 font-black p-5 rounded-2xl shadow-[0_20px_40px_rgba(15,23,42,0.2)] hover:scale-[0.98] active:scale-95 transition-all text-xs uppercase tracking-widest">Execute Sync</button>
                    </div>
                </div>
            </div>
        );

        const InputField = ({ label, icon, placeholder }) => (
            <div className="space-y-2">
                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 flex items-center gap-2">
                    <span>{icon}</span> {label}
                </label>
                <input className="w-full p-4 rounded-2xl bg-slate-50 border-none ring-2 ring-slate-100 focus:ring-yellow-400 outline-none text-xs font-bold transition-all placeholder:text-slate-300" placeholder={placeholder} />
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
